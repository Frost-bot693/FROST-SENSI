name: Build FROST SENSI APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip Android project
        run: unzip -o FrostSensi_AndroidProject.zip

      - name: Enable Kotlin support
        run: |
          sed -i "s/id 'com.android.application' version '8.4.1' apply false/id 'com.android.application' version '8.4.1' apply false\n    id 'org.jetbrains.kotlin.android' version '1.9.24' apply false/" FrostSensi/build.gradle
          sed -i "s/id 'com.android.application'/id 'com.android.application'\n    id 'org.jetbrains.kotlin.android'/" FrostSensi/app/build.gradle
          cat >> FrostSensi/app/build.gradle << 'EOF'

          android {
              kotlinOptions {
                  jvmTarget = '17'
              }
          }
          EOF

      - name: Fix dependency conflicts
        run: |
          sed -i "/androidx.webkit:webkit/d" FrostSensi/app/build.gradle
          cat >> FrostSensi/app/build.gradle << 'EOF'

          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.24'
                  exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
                  exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
              }
          }
          EOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build debug APK
        working-directory: FrostSensi
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: frost-sensi-debug-apk
          path: FrostSensi/app/build/outputs/apk/debug/*.apk
